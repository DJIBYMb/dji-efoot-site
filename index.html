<!DOCTYPE html>
<html>

<head>
    <title>DJI eFoot</title>

    <style>
        body{
            background: linear-gradient(135deg,#111,#222);
            font-family: Arial;
            text-align:center;
            color:white;
            padding-top:50px;
        }

        .card{
            background:white;
            color:black;
            width:350px;
            margin:auto;
            padding:30px;
            border-radius:25px;
            box-shadow:0 0 25px rgba(255,255,255,0.2);
        }

        img{
            width:150px;
            height:150px;
            border-radius:50%;
            object-fit:cover;
            border:5px solid black;
        }

        h1{
            margin-top:15px;
        }

        .btn{
            display:block;
            padding:15px;
            margin:15px;
            border-radius:15px;
            text-decoration:none;
            color:white;
            font-size:20px;
            font-weight:bold;
        }

        .youtube{
            background:red;
        }

        .tiktok{
            background:black;
        }
    </style>
</head>

<body>

<div class="card">

<img src="photo.jpg">

<h1>DJI eFoot</h1>

<p>Bienvenue sur mes réseaux 🔥</p>

<a class="btn youtube"
href="https://www.youtube.com/@dji.eFoot14"
target="_blank">
▶️ YouTube
</a>

<a class="btn tiktok"
href="https://www.tiktok.com/@dji.efootbal"
target="_blank">
🎵 TikTok
</a>

</div>

</body>
</html>
