<!DOCTYPE html>
<html>

<head>
<title>DJI eFoot</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.phone{
    width:390px;
    height:844px;
    background:#111;
    border-radius:40px;
    overflow:hidden;
    border:6px solid #333;
    box-shadow:0 0 30px rgba(255,255,255,0.2);
}

.card{
    text-align:center;
    color:white;
    padding-top:40px;
}

img{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
}

h1{
    font-size:42px;
    margin-top:20px;
}

p{
    font-size:20px;
}

.btn{
    display:block;
    width:80%;
    margin:25px auto;
    padding:20px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    font-size:28px;
    font-weight:bold;
}

.youtube{
    background:red;
}

.tiktok{
    background:black;
    border:2px solid white;
}

</style>
</head>

<body>

<div class="phone">

<div class="card">

<img src="photo.jpg">

<h1>DJI eFoot</h1>

<p>Bienvenue sur mes réseaux 🔥</p>

<a class="btn youtube"
href="https://www.youtube.com/@dji.eFoot14"
target="_blank">
▶️ YouTube
</a>

<a class="btn tiktok"
href="https://www.tiktok.com/@dji.efootbal"
target="_blank">
🎵 TikTok
</a>

</div>

</div>

</body>
</html>
