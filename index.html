<!DOCTYPE html>
<html>
<head>
<title>DJI eFoot Shop</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
}

header{
    background:black;
    text-align:center;
    padding:25px;
    font-size:38px;
    font-weight:bold;
    border-bottom:3px solid red;
}

.hero{
    text-align:center;
    padding:40px 20px;
}

.profile{
    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
}

.hero h1{
    font-size:42px;
}

.hero p{
    font-size:20px;
    color:#ccc;
}

.social-btn{
    display:block;
    width:80%;
    max-width:400px;
    margin:20px auto;
    padding:18px;
    border-radius:20px;
    text-decoration:none;
    color:white;
    font-size:24px;
    font-weight:bold;
}

.youtube{
    background:red;
}

.tiktok{
    background:black;
    border:2px solid white;
}

.banner{
    text-align:center;
    padding:35px 20px;
    background:linear-gradient(135deg,#1a1a1a,#333);
}

.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:30px;
    gap:25px;
}

.card{
    background:#1c1c1c;
    width:300px;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(255,255,255,0.1);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:20px;
}

.price{
    color:#00ff88;
    font-size:24px;
    margin:15px 0;
}

.btn{
    display:block;
    background:#25D366;
    color:white;
    text-align:center;
    padding:15px;
    border-radius:12px;
    text-decoration:none;
    font-size:20px;
    font-weight:bold;
}

footer{
    text-align:center;
    padding:30px;
    background:black;
    color:#999;
}
</style>
</head>

<body>

<header>DJI eFoot</header>

<section class="hero">
    <img class="profile" src="photo.jpeg">

    <h1>DJI eFoot</h1>
    <p>Bienvenue sur mes réseaux et ma boutique </p>

    <a class="social-btn youtube" href="https://www.youtube.com/@dji.eFoot14" target="_blank">
         YouTube
    </a>

    <a class="social-btn tiktok" href="https://www.tiktok.com/@dji.efootbal" target="_blank">
         TikTok
    </a>
</section>

<section class="banner">
    <h1>Ma boutique 🛒</h1>
    <p>Commande directement sur WhatsApp</p>
</section>

<section class="products">

<div class="card">
<img src="maillot.jpeg">
<div class="card-content">
<h2>refroidisseur</h2>
<div class="price">8000 FCFA</div>
<a class="btn" href="https://wa.me/33745098191" target="_blank">
Commander sur WhatsApp
</a>
</div>
</div>

<div class="card">
<img src="gan.jpeg">
<div class="card-content">
<h2>Maillot Foot</h2>
<div class="price">1500 FCFA</div>
<a class="btn" href="https://wa.me/33745098191" target="_blank">
Commander sur WhatsApp
</a>
</div>
</div>

<div class="card">
<img src="compte.jpeg">
<div class="card-content">
<h2>compte</h2>
<div class="price">100000 FCFA</div>
<a class="btn" href="https://wa.me/33745098191" target="_blank">
Commander sur WhatsApp
</a>
</div>
</div>

</section>

<footer>
 DJI eFoot Shop - 
</footer>

</body>
</html>
